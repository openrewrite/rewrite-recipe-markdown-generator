name: Benchmark full generation

# Times a single `gradlew run` on the current branch and reports
# elapsed wall time + generated-file counts to the job summary.
# Baseline ~60 min on main as of 2026-05-22 — compare against the
# number this workflow produces on the branch.

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v5

      - name: Generate markdown (timed)
        run: |
          set -o pipefail
          start_ns=$(date +%s%N)
          ./gradlew run --no-daemon 2>&1 | tee /tmp/run.log
          end_ns=$(date +%s%N)
          elapsed_ms=$(( (end_ns - start_ns) / 1000000 ))
          echo "ELAPSED_MS=$elapsed_ms" >> "$GITHUB_ENV"

      - name: Summarize
        if: always()
        run: |
          ms=${ELAPSED_MS:-0}
          s=$(( ms / 1000 ))
          m=$(( s / 60 ))
          rem_s=$(( s % 60 ))
          descriptors=$(grep -E '^Found [0-9]+ descriptor' /tmp/run.log | head -1 || echo "unknown")
          md_files=$(find build/docs build/moderne-docs -name '*.md' 2>/dev/null | wc -l || echo 0)
          {
            echo "## Benchmark"
            echo
            echo "- Branch: \`${GITHUB_REF_NAME}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Wall time: ${m}m ${rem_s}s  (${ms} ms)"
            echo "- ${descriptors}"
            echo "- Markdown files generated: ${md_files}"
            echo
            echo "_Baseline reference: ~60 min on \`main\` as of 2026-05-22._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload generator log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log-${{ github.run_attempt }}
          path: /tmp/run.log
          retention-days: 7
