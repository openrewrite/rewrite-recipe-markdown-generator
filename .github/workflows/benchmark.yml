name: Benchmark full generation

# Workflow-dispatch-only so a maintainer can trigger it on a branch and
# on main and compare wall-clock times. The full `gradlew run` resolves
# many recipe dependencies and emits the full Moderne + OpenRewrite docs
# output — substantially heavier than the latestVersionsOnly path the
# regular CI runs.

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v5

      - name: Generate markdown (timed)
        run: |
          set -o pipefail
          start_ns=$(date +%s%N)
          ./gradlew run --no-daemon | tee /tmp/run.log
          end_ns=$(date +%s%N)
          elapsed_ms=$(( (end_ns - start_ns) / 1000000 ))
          descriptors=$(grep -E '^Found [0-9]+ descriptor' /tmp/run.log | head -1 || true)
          generated_md=$(find build/docs build/moderne-docs -name '*.md' 2>/dev/null | wc -l || echo 0)
          {
            echo "## Benchmark"
            echo
            echo "- Branch: \`${GITHUB_REF_NAME}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Wall time: ${elapsed_ms} ms ($((elapsed_ms / 1000))s)"
            echo "- Descriptors: ${descriptors:-unknown}"
            echo "- Markdown files generated: ${generated_md}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload generator log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log-${{ github.ref_name }}-${{ github.run_attempt }}
          path: /tmp/run.log
          retention-days: 7
